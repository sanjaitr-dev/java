<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser Launcher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0c0f;
    --surface: #13141a;
    --card: #1a1c24;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0f0f0;
    --muted: #6b6e7e;
    --accent: #e8e8e8;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
  }

  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    background-size: 200px;
    opacity: 0.4;
  }

  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%);
    top: -150px; left: 50%; transform: translateX(-50%);
    pointer-events: none; z-index: 0;
  }

  .wrapper {
    position: relative; z-index: 1;
    width: 100%; max-width: 560px;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: var(--text);
  }

  h1 span {
    color: var(--muted);
  }

  .url-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
  }

  .url-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.5rem;
  }

  .url-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #urlInput {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  #urlInput:focus {
    border-color: var(--border-hover);
  }

  .save-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 1rem;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  .save-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: var(--border-hover);
  }

  .save-btn.saved {
    color: #6ee7b7;
    border-color: rgba(110,231,183,0.3);
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .browsers {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  .browser-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    cursor: pointer;
    transition: border-color 0.25s, background 0.25s, transform 0.15s;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1rem;
    position: relative;
    overflow: hidden;
    text-decoration: none;
  }

  .browser-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .browser-card:hover {
    border-color: var(--border-hover);
    background: #1e2028;
    transform: translateY(-2px);
  }

  .browser-card:active {
    transform: translateY(0px) scale(0.98);
  }

  .browser-card.firefox::after { background: radial-gradient(circle at 30% 30%, rgba(255,103,20,0.07), transparent 60%); }
  .browser-card.chrome::after  { background: radial-gradient(circle at 30% 30%, rgba(66,133,244,0.07), transparent 60%); }
  .browser-card.edge::after    { background: radial-gradient(circle at 30% 30%, rgba(0,120,212,0.07), transparent 60%); }
  .browser-card.brave::after   { background: radial-gradient(circle at 30% 30%, rgba(251,84,43,0.07), transparent 60%); }

  .browser-card:hover::after { opacity: 1; }

  .icon-wrap {
    width: 52px; height: 52px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .icon-wrap svg { width: 36px; height: 36px; }

  .browser-info { flex: 1; }

  .browser-name {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 3px;
  }

  .browser-desc {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .arrow {
    position: absolute;
    top: 1.25rem; right: 1.25rem;
    width: 18px; height: 18px;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
  }

  .browser-card:hover .arrow {
    opacity: 1;
    transform: translate(2px, -2px);
  }

  .toast {
    position: fixed;
    bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--border-hover);
    border-radius: 10px;
    padding: 0.6rem 1.2rem;
    font-size: 13px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 100;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  footer {
    margin-top: 2.5rem;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="noise"></div>
<div class="glow"></div>

<div class="wrapper">
  <header>
    <p class="eyebrow">Quick Launch</p>
    <h1>Open in <span>any browser</span></h1>
  </header>

  <div class="url-block">
    <span class="url-label">Target URL</span>
    <div class="url-row">
      <input type="text" id="urlInput" value="https://example.com" spellcheck="false" />
      <button class="save-btn" id="saveBtn" onclick="saveUrl()">Set</button>
    </div>
  </div>

  <p class="section-label">Choose your browser</p>

  <div class="browsers">

    <!-- Firefox -->
    <div class="browser-card firefox" onclick="launch('firefox')">
      <div class="icon-wrap" style="background: rgba(255,103,20,0.1);">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="20" fill="#FF6713" opacity="0.15"/>
          <path d="M52 32C52 21 43 12 32 12C23.5 12 16.3 17.3 13.5 24.8C15 23.5 17 22.7 19.2 22.7C23.5 22.7 27 26.2 27 30.5C27 32.2 26.4 33.8 25.5 35C25.2 35.4 25.5 36 26 35.8C28.2 35 30 32.9 30 30.4C30 28.5 29.1 26.8 27.7 25.7C29.1 24.8 30.9 24.2 33 24.2C38.5 24.2 43 28.6 43 34C43 39.3 38.7 43.6 33.4 43.9C33.6 43.9 33.8 44 34 44C44 44 52 38.9 52 32Z" fill="#FF6713"/>
          <path d="M32 44C26.5 44 22 39.5 22 34C22 30.5 23.8 27.4 26.5 25.6C24.1 26.9 22.5 29.5 22.5 32.4C22.5 36.8 26 40.3 30.4 40.3C33.1 40.3 35.5 39 37 36.9C35.5 40.9 32 44 32 44Z" fill="#FF9500"/>
          <circle cx="32" cy="32" r="20" stroke="#FF6713" stroke-width="1.5" stroke-opacity="0.3" fill="none"/>
        </svg>
      </div>
      <div class="browser-info">
        <div class="browser-name">Firefox</div>
        <div class="browser-desc">mozilla</div>
      </div>
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
    </div>

    <!-- Chrome -->
    <div class="browser-card chrome" onclick="launch('chrome')">
      <div class="icon-wrap" style="background: rgba(66,133,244,0.1);">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="10" fill="#4285F4"/>
          <circle cx="32" cy="32" r="10" fill="white"/>
          <circle cx="32" cy="32" r="6" fill="#4285F4"/>
          <path d="M32 22 L52 22 A20 20 0 0 1 42 39 Z" fill="#EA4335"/>
          <path d="M52 22 A20 20 0 0 1 42 39 L32 32 Z" fill="#FBBC04"/>
          <path d="M42 39 A20 20 0 0 1 22 39 L32 32 Z" fill="#34A853"/>
          <path d="M22 39 A20 20 0 0 1 32 22 L32 32 Z" fill="#4285F4"/>
          <circle cx="32" cy="32" r="20" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>
        </svg>
      </div>
      <div class="browser-info">
        <div class="browser-name">Chrome</div>
        <div class="browser-desc">google</div>
      </div>
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
    </div>

    <!-- Edge -->
    <div class="browser-card edge" onclick="launch('edge')">
      <div class="icon-wrap" style="background: rgba(0,120,212,0.1);">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="edgeGrad1" x1="20" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#50E6FF"/>
              <stop offset="100%" stop-color="#0078D4"/>
            </linearGradient>
            <linearGradient id="edgeGrad2" x1="16" y1="34" x2="52" y2="50" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#0078D4"/>
              <stop offset="100%" stop-color="#003BA5"/>
            </linearGradient>
          </defs>
          <path d="M12 30C12 19.5 20.5 11 31 11C38 11 44.1 14.8 47.5 20.5C44.8 18.5 41.5 17.3 38 17.3C29.7 17.3 23 24 23 32.3C23 35.5 24 38.5 25.8 40.9C20 39.5 15.3 35.4 12.5 30H12Z" fill="url(#edgeGrad1)"/>
          <path d="M25 43.5C26 44 27.1 44.3 28.2 44.5C19 44.2 12 37.2 12 28.5C12 28 12 27.5 12.1 27C12 27.5 12 28 12 28.5C12 37.5 19 44.8 28.2 44.8C28.8 44.8 29.5 44.7 30 44.7C29.5 44.7 29 44.7 28.5 44.6" fill="#50E6FF" opacity="0.5"/>
          <path d="M47 38C44.2 42 39.8 44.8 34.8 45C28.3 45.3 22.7 41.7 20 36.3C21.5 38 23.5 39 25.8 39C31.2 39 35.5 34.8 35.5 29.3C35.5 27.5 35 25.8 34.2 24.4C39.7 26.1 43.8 30.5 47 38Z" fill="url(#edgeGrad2)"/>
        </svg>
      </div>
      <div class="browser-info">
        <div class="browser-name">Edge</div>
        <div class="browser-desc">microsoft</div>
      </div>
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
    </div>

    <!-- Brave -->
    <div class="browser-card brave" onclick="launch('brave')">
      <div class="icon-wrap" style="background: rgba(251,84,43,0.1);">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="braveGrad" x1="32" y1="10" x2="32" y2="54" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#FF6000"/>
              <stop offset="100%" stop-color="#FB542B"/>
            </linearGradient>
          </defs>
          <path d="M32 10L46 16V30C46 39 39 46.5 32 50C25 46.5 18 39 18 30V16L32 10Z" fill="url(#braveGrad)" opacity="0.15"/>
          <path d="M32 10L46 16V30C46 39 39 46.5 32 50C25 46.5 18 39 18 30V16L32 10Z" stroke="#FB542B" stroke-width="1.5" fill="none"/>
          <path d="M38 25L35 31H37L34 39L26 27H29L28 22H36L38 25Z" fill="#FB542B"/>
          <path d="M26 27L28 22H29L28 27L26 27Z" fill="#FF8C6B"/>
          <path d="M37 31L35 31L34 39L36 35L37 31Z" fill="#FF8C6B"/>
        </svg>
      </div>
      <div class="browser-info">
        <div class="browser-name">Brave</div>
        <div class="browser-desc">brave software</div>
      </div>
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
    </div>

  </div>

  <footer>click a browser to open your url &nbsp;·&nbsp; works on windows &amp; mac</footer>
</div>

<div class="toast" id="toast"></div>

<script>
  const browserPaths = {
    firefox: {
      win: 'C:\\Program Files\\Mozilla Firefox\\firefox.exe',
      mac: '/Applications/Firefox.app'
    },
    chrome: {
      win: 'C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe',
      mac: '/Applications/Google Chrome.app'
    },
    edge: {
      win: 'C:\\Program Files (x86)\\Microsoft\\Edge\\Application\\msedge.exe',
      mac: '/Applications/Microsoft Edge.app'
    },
    brave: {
      win: 'C:\\Program Files\\BraveSoftware\\Brave-Browser\\Application\\brave.exe',
      mac: '/Applications/Brave Browser.app'
    }
  };

  function getUrl() {
    let url = document.getElementById('urlInput').value.trim();
    if (url && !url.startsWith('http://') && !url.startsWith('https://')) {
      url = 'https://' + url;
    }
    return url || 'https://example.com';
  }

  function saveUrl() {
    const btn = document.getElementById('saveBtn');
    btn.textContent = 'Saved!';
    btn.classList.add('saved');
    setTimeout(() => {
      btn.textContent = 'Set';
      btn.classList.remove('saved');
    }, 1500);
    showToast('URL updated');
  }

  function launch(browser) {
    const url = getUrl();
    const isWin = navigator.platform.startsWith('Win');
    const isMac = navigator.platform.startsWith('Mac');

    let launched = false;

    if (isWin) {
      const exePath = browserPaths[browser].win;
      const cmd = `${exePath} ${url}`;
      try {
        const a = document.createElement('a');
        if (browser === 'firefox') a.href = `firefox:${url}`;
        else if (browser === 'chrome') a.href = `googlechrome://${url.replace(/^https?:\/\//, '')}`;
        else if (browser === 'edge') a.href = `microsoft-edge:${url}`;
        else if (browser === 'brave') a.href = `brave://${url.replace(/^https?:\/\//, '')}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        launched = true;
      } catch(e) {}
    }

    if (isMac) {
      const appPath = browserPaths[browser].mac;
      try {
        const a = document.createElement('a');
        if (browser === 'firefox') a.href = `firefox:${url}`;
        else if (browser === 'chrome') a.href = `googlechrome://${url.replace(/^https?:\/\//, '')}`;
        else if (browser === 'edge') a.href = `microsoft-edge:${url}`;
        else if (browser === 'brave') a.href = `brave://${url.replace(/^https?:\/\//, '')}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        launched = true;
      } catch(e) {}
    }

    if (!launched) {
      window.open(url, '_blank');
    }

    showToast(`Opening ${browser.charAt(0).toUpperCase() + browser.slice(1)}...`);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
